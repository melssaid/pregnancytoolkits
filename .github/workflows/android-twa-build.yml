name: android-twa-build-signed

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      KEYSTORE_PATH: ${{ github.workspace }}/upload-keystore.jks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate twa-manifest.json
        id: locate_manifest
        run: |
          MANIFEST_PATH=$(find . -type f -name "twa-manifest.json" | head -n 1)
          if [ -z "$MANIFEST_PATH" ]; then
            echo "❌ twa-manifest.json not found anywhere in repository"
            exit 1
          fi
          echo "✅ Found manifest: $MANIFEST_PATH"
          echo "manifest_path=$MANIFEST_PATH" >> "$GITHUB_OUTPUT"
          echo "manifest_dir=$(dirname "$MANIFEST_PATH")" >> "$GITHUB_OUTPUT"

      - name: Validate required secrets
        run: |
          [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] || { echo "❌ Missing ANDROID_KEYSTORE_BASE64"; exit 1; }
          [ -n "${{ secrets.ANDROID_KEY_ALIAS }}" ] || { echo "❌ Missing ANDROID_KEY_ALIAS"; exit 1; }
          [ -n "${{ secrets.ANDROID_KEY_PASSWORD }}" ] || { echo "❌ Missing ANDROID_KEY_PASSWORD"; exit 1; }

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bubblewrap
        run: npm i -g @bubblewrap/cli

      - name: Decode keystore
        run: |
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$KEYSTORE_PATH"
          test -s "$KEYSTORE_PATH" || { echo "❌ Decoded keystore is empty"; exit 1; }
          echo "✅ Keystore ready"

      - name: Patch signing in twa-manifest.json
        env:
          MANIFEST_PATH: ${{ steps.locate_manifest.outputs.manifest_path }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = process.env.MANIFEST_PATH;
          const m = JSON.parse(fs.readFileSync(file, 'utf8'));

          m.signingKey = m.signingKey || {};
          m.signingKey.path = process.env.KEYSTORE_PATH;
          m.signingKey.alias = process.env.ANDROID_KEY_ALIAS;
          m.signingKey.password = process.env.ANDROID_KEY_PASSWORD;

          fs.writeFileSync(file, JSON.stringify(m, null, 2));
          console.log(`✅ Updated signingKey in ${file}`);
          NODE

      - name: Build TWA
        working-directory: ${{ steps.locate_manifest.outputs.manifest_dir }}
        run: |
          bubblewrap --version
          bubblewrap doctor || true
          bubblewrap build --skipPwaValidation

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: |
            ./**/build/outputs/apk/release/*.apk
            ./**/release/*.apk
            ./**/app-release*.apk
          if-no-files-found: warn
          retention-days: 7

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: |
            ./**/build/outputs/bundle/release/*.aab
            ./**/release/*.aab
            ./**/app-release*.aab
          if-no-files-found: warn
          retention-days: 7
