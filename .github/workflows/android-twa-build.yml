name: Android TWA Build

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Android version code (integer, e.g. 2)"
        required: false
        default: "1"
      version_name:
        description: "Android version name (e.g. 1.0.1)"
        required: false
        default: "1.0.0"
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present

  android-twa:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [web-build]
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Decode keystore
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "${{ github.workspace }}/android.keystore"
          chmod 600 "${{ github.workspace }}/android.keystore"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Patch TWA manifest (signing key + version)
        run: |
          VERSION_CODE="${{ github.event.inputs.version_code || '1' }}"
          VERSION_NAME="${{ github.event.inputs.version_name || '1.0.0' }}"
          jq \
            --arg alias "$KEY_ALIAS" \
            --arg keyPath "${{ github.workspace }}/android.keystore" \
            --argjson vcode "$VERSION_CODE" \
            --arg vname "$VERSION_NAME" \
            '.signingKey.alias = $alias | .signingKey.path = $keyPath | .appVersionCode = $vcode | .appVersionName = $vname' \
            twa-manifest.json > twa-manifest.patched.json
          mv twa-manifest.patched.json twa-manifest.json
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Debug environment paths
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "JAVA_HOME_17_X64=$JAVA_HOME_17_X64"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          java -version 2>&1 || echo "java not found"
          ls "$ANDROID_HOME/" 2>/dev/null || echo "ANDROID_HOME dir not found"
          ls "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "build-tools not found"
          ls "$ANDROID_HOME/platforms/" 2>/dev/null || echo "platforms not found"
          ls "$ANDROID_HOME/cmdline-tools/" 2>/dev/null || echo "cmdline-tools not found"

      - name: Accept Android SDK licenses
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses 2>/dev/null || true

      - name: Prepare Bubblewrap config (non-interactive)
        run: |
          JDK_PATH="${JAVA_HOME_17_X64:-${JAVA_HOME}}"
          SDK_PATH="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          mkdir -p "$HOME/.bubblewrap"
          python3 -c "import json; json.dump({'jdkPath':'$JDK_PATH','androidSdkPath':'$SDK_PATH'}, open('$HOME/.bubblewrap/config.json','w'))"
          echo "=== Bubblewrap config ==="
          cat "$HOME/.bubblewrap/config.json"
          echo ""
          echo "=== Verify SDK path exists ==="
          test -d "$SDK_PATH" && echo "SDK dir OK" || echo "SDK dir MISSING: $SDK_PATH"
          test -d "$SDK_PATH/build-tools" && echo "build-tools OK" || echo "build-tools MISSING"
          test -d "$SDK_PATH/platforms" && echo "platforms OK" || echo "platforms MISSING"

      - name: Build Android TWA (AAB + APK)
        run: |
          bubblewrap build --skipPwaValidation \
            --signingKeyPassword "$KEY_PASSWORD" \
            --keystorePassword "$STORE_PASSWORD"
        env:
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: app-release-bundle/app-release.aab
          if-no-files-found: warn

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: app-release.apk
          if-no-files-found: warn
