name: Android TWA Build

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Android version code (integer, e.g. 2)"
        required: false
        default: "1"
      version_name:
        description: "Android version name (e.g. 1.0.1)"
        required: false
        default: "1.0.0"
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present

  android-twa:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [web-build]
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve Android SDK path for CI
        run: |
          CANDIDATES=(
            "${ANDROID_HOME:-}"
            "${ANDROID_SDK_ROOT:-}"
            "/usr/local/lib/android/sdk"
            "$HOME/android-sdk"
            "$HOME/android/sdk"
          )

          for path in "${CANDIDATES[@]}"; do
            if [ -n "$path" ] && [ -d "$path" ]; then
              echo "ANDROID_HOME=$path" >> "$GITHUB_ENV"
              echo "ANDROID_SDK_ROOT=$path" >> "$GITHUB_ENV"
              echo "Resolved Android SDK path: $path"
              exit 0
            fi
          done

          echo "Android SDK path not found"
          exit 1

      - name: Install required Android SDK packages
        run: |
          if command -v sdkmanager >/dev/null 2>&1; then
            SDKMANAGER="sdkmanager"
          elif [ -x "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          elif [ -x "$ANDROID_HOME/cmdline-tools/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_HOME/cmdline-tools/bin/sdkmanager"
          else
            echo "sdkmanager not found"
            exit 1
          fi

          "$SDKMANAGER" --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          yes | "$SDKMANAGER" --licenses >/dev/null || true

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Decode keystore
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "${{ github.workspace }}/android.keystore"
          chmod 600 "${{ github.workspace }}/android.keystore"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Patch TWA manifest (signing key + version)
        run: |
          VERSION_CODE="${{ github.event.inputs.version_code || '1' }}"
          VERSION_NAME="${{ github.event.inputs.version_name || '1.0.0' }}"
          jq \
            --arg alias "$KEY_ALIAS" \
            --arg keyPath "${{ github.workspace }}/android.keystore" \
            --argjson vcode "$VERSION_CODE" \
            --arg vname "$VERSION_NAME" \
            '.signingKey.alias = $alias | .signingKey.path = $keyPath | .appVersionCode = $vcode | .appVersionName = $vname' \
            twa-manifest.json > twa-manifest.patched.json
          mv twa-manifest.patched.json twa-manifest.json
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Debug environment paths
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          java -version 2>&1
          echo "--- SDK contents ---"
          ls -la "$ANDROID_HOME/" 2>/dev/null || echo "ANDROID_HOME not found"
          ls "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "build-tools not found"
          ls "$ANDROID_HOME/platforms/" 2>/dev/null || echo "platforms not found"
          ls "$ANDROID_HOME/platform-tools/" 2>/dev/null || echo "platform-tools not found"

      - name: Prepare Bubblewrap config (non-interactive)
        run: |
          SDK_PATH="${ANDROID_HOME}"
          JDK_PATH="${JAVA_HOME}"

          test -d "$SDK_PATH" || { echo "SDK dir missing: $SDK_PATH"; exit 1; }
          test -d "$SDK_PATH/build-tools" || { echo "build-tools missing"; exit 1; }
          test -d "$SDK_PATH/platform-tools" || { echo "platform-tools missing"; exit 1; }

          mkdir -p "$HOME/.bubblewrap"
          python3 << PYEOF
          import json
          config = {
              "jdkPath": "${JDK_PATH}",
              "androidSdkPath": "${SDK_PATH}"
          }
          with open("$HOME/.bubblewrap/config.json", "w") as f:
              json.dump(config, f)
          print("Config written:", json.dumps(config))
          PYEOF

      - name: Build Android TWA (AAB + APK)
        run: |
          printf 'n\n' | bubblewrap build --skipPwaValidation \
            --signingKeyPassword "$KEY_PASSWORD" \
            --keystorePassword "$STORE_PASSWORD"
        env:
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: app-release-bundle/app-release.aab
          if-no-files-found: warn

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: app-release.apk
          if-no-files-found: warn
