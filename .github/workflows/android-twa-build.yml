name: Android TWA Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # ينشئ keystore مؤقت داخل الـ runner (للتجربة/الإخراج فقط)
      - name: Generate temporary keystore
        run: |
          keytool -genkeypair -v \
            -storetype JKS \
            -keystore ${{ github.workspace }}/upload-keystore.jks \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=GitHub,O=GitHub,OU=CI,L=NA,S=NA,C=US"

      - name: Create key.properties
        run: |
          cat > key.properties <<EOF
          storeFile=${{ github.workspace }}/upload-keystore.jks
          storePassword=android
          keyAlias=upload
          keyPassword=android
          EOF

      - name: Build APK (release)
        run: ./gradlew assembleRelease --stacktrace

      - name: Build AAB (release)
        run: ./gradlew bundleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/*.aab
