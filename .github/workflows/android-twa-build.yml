name: Android TWA Build (Signed)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-twa:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    env:
      KEYSTORE_PATH: ${{ github.workspace }}/upload-keystore.jks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate TWA manifest exists
        run: |
          [ -f "twa-manifest.json" ] || { echo "twa-manifest.json not found in repo root"; exit 1; }

      - name: Validate required signing secrets
        run: |
          [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] || { echo "Missing ANDROID_KEYSTORE_BASE64"; exit 1; }
          [ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] || { echo "Missing ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          [ -n "${{ secrets.ANDROID_KEY_ALIAS }}" ] || { echo "Missing ANDROID_KEY_ALIAS"; exit 1; }
          [ -n "${{ secrets.ANDROID_KEY_PASSWORD }}" ] || { echo "Missing ANDROID_KEY_PASSWORD"; exit 1; }

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bubblewrap
        run: npm i -g @bubblewrap/cli

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_PATH"
          ls -lah "$KEYSTORE_PATH"

      - name: Patch twa-manifest signing config
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'twa-manifest.json';
          const m = JSON.parse(fs.readFileSync(path, 'utf8'));

          m.signingKey = m.signingKey || {};
          m.signingKey.path = process.env.KEYSTORE_PATH;
          m.signingKey.alias = process.env.ANDROID_KEY_ALIAS;
          m.signingKey.password = process.env.ANDROID_KEY_PASSWORD;
          m.signingKey.keyStorePassword = process.env.ANDROID_KEYSTORE_PASSWORD;

          fs.writeFileSync(path, JSON.stringify(m, null, 2));
          console.log('Updated signingKey in twa-manifest.json');
          NODE

      - name: Build TWA Android project
        run: bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: |
            ./**/build/outputs/apk/release/*.apk
            ./**/release/*.apk
            ./**/app-release*.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: |
            ./**/build/outputs/bundle/release/*.aab
            ./**/release/*.aab
            ./**/app-release*.aab
          if-no-files-found: error
