name: android-build-signed

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      KEYSTORE_PATH: ${{ github.workspace }}/upload-keystore.jks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate gradle wrapper
        id: locate
        run: |
          if [ -f "./gradlew" ]; then
            echo "workdir=." >> "$GITHUB_OUTPUT"
          elif [ -f "./android/gradlew" ]; then
            echo "workdir=./android" >> "$GITHUB_OUTPUT"
          elif [ -f "./twa/gradlew" ]; then
            echo "workdir=./twa" >> "$GITHUB_OUTPUT"
          else
            echo "❌ gradlew not found in ., ./android, or ./twa"
            exit 1
          fi
          echo "✅ Gradle dir: $(cat $GITHUB_OUTPUT | tail -n1)"

      - name: Validate required secrets
        run: |
          [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] || { echo "❌ Missing ANDROID_KEYSTORE_BASE64"; exit 1; }
          [ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] || { echo "❌ Missing ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          [ -n "${{ secrets.ANDROID_KEY_ALIAS }}" ] || { echo "❌ Missing ANDROID_KEY_ALIAS"; exit 1; }
          [ -n "${{ secrets.ANDROID_KEY_PASSWORD }}" ] || { echo "❌ Missing ANDROID_KEY_PASSWORD"; exit 1; }

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Decode keystore
        run: |
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$KEYSTORE_PATH"
          test -s "$KEYSTORE_PATH" || { echo "❌ Keystore decode failed"; exit 1; }

      - name: Create key.properties
        working-directory: ${{ steps.locate.outputs.workdir }}
        run: |
          cat > key.properties <<EOF
          storeFile=${KEYSTORE_PATH}
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          echo "✅ key.properties created in $(pwd)"

      - name: Build signed APK + AAB
        working-directory: ${{ steps.locate.outputs.workdir }}
        run: |
          chmod +x ./gradlew
          ./gradlew clean assembleRelease bundleRelease --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: |
            ${{ steps.locate.outputs.workdir }}/app/build/outputs/apk/release/*.apk
            ${{ steps.locate.outputs.workdir }}/**/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: |
            ${{ steps.locate.outputs.workdir }}/app/build/outputs/bundle/release/*.aab
            ${{ steps.locate.outputs.workdir }}/**/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 7
