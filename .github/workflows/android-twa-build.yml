name: Build Android TWA (AAB + APK)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "main-work" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: "17"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Generate keystore (temporary for build)
        run: |
          keytool -genkeypair -v \
            -keystore android/app/release.keystore \
            -alias upload \
            -storepass "123456" \
            -keypass "123456" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Pregnancy Toolkits, OU=Mobile, O=PregnancyToolkits, L=NA, S=NA, C=US"

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=app/release.keystore
          storePassword=123456
          keyAlias=upload
          keyPassword=123456
          EOF

      - name: Print signing SHA-256 fingerprint
        run: |
          keytool -list -v \
            -keystore android/app/release.keystore \
            -storepass "123456" \
            -alias "upload" \
            -keypass "123456" | grep "SHA256:" || true

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
