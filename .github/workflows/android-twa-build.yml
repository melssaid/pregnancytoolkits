name: Build Android TWA (Signed AAB + APK)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "main-work" ]

permissions:
  contents: read

concurrency:
  group: android-twa-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      JAVA_VERSION: "17"
      KEYSTORE_PATH: android/app/release.keystore

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for v in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
         ](#)
