name: Android Build (APK + AAB)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    env:
      KEYSTORE_PATH: ${{ github.workspace }}/upload-keystore.jks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Detect Android build mode
        id: detect
        run: |
          if [ -f "./gradlew" ]; then
            echo "mode=gradle" >> "$GITHUB_OUTPUT"
            echo "workdir=." >> "$GITHUB_OUTPUT"
          elif [ -f "./android/gradlew" ]; then
            echo "mode=gradle" >> "$GITHUB_OUTPUT"
            echo "workdir=./android" >> "$GITHUB_OUTPUT"
          elif [ -f "./twa/gradlew" ]; then
            echo "mode=gradle" >> "$GITHUB_OUTPUT"
            echo "workdir=./twa" >> "$GITHUB_OUTPUT"
          elif [ -f "./twa-manifest.json" ]; then
            echo "mode=twa" >> "$GITHUB_OUTPUT"
            echo "workdir=." >> "$GITHUB_OUTPUT"
          else
            echo "No gradlew or twa-manifest.json found."
            exit 1
          fi

      - name: Validate required secrets
        run: |
          [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] || { echo "Missing ANDROID_KEYSTORE_BASE64"; exit 1; }
          [ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] || { echo "Missing ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          [ -n "${{ secrets.ANDROID_KEY_ALIAS }}" ] || { echo "Missing ANDROID_KEY_ALIAS"; exit 1; }
          [ -n "${{ secrets.ANDROID_KEY_PASSWORD }}" ] || { echo "Missing ANDROID_KEY_PASSWORD"; exit 1; }

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_PATH"
          ls -lah "$KEYSTORE_PATH"

      # -----------------------
      # Gradle path
      # -----------------------
      - name: Create key.properties for Gradle
        if: steps.detect.outputs.mode == 'gradle'
        working-directory: ${{ steps.detect.outputs.workdir }}
        run: |
          cat > key.properties <<EOF
          storeFile=${KEYSTORE_PATH}
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          echo "key.properties created in $(pwd)"

      - name: Build release APK/AAB with Gradle
        if: steps.detect.outputs.mode == 'gradle'
        working-directory: ${{ steps.detect.outputs.workdir }}
        run: |
          chmod +x ./gradlew
          ./gradlew --version
          ./gradlew clean assembleRelease bundleRelease --stacktrace

      # -----------------------
      # Bubblewrap TWA path
      # -----------------------
      - name: Install Bubblewrap CLI
        if: steps.detect.outputs.mode == 'twa'
        run: npm i -g @bubblewrap/cli

      - name: Patch twa-manifest.json signing info
        if: steps.detect.outputs.mode == 'twa'
        run: |
          node <<'NODE'
          const fs = require('fs');
          const p = 'twa-manifest.json';
          const j = JSON.parse(fs.readFileSync(p, 'utf8'));

          // دعم أكثر من شكل للمفاتيح
          j.signingKey = j.signingKey || {};
          j.signingKey.path = process.env.KEYSTORE_PATH;
          j.signingKey.alias = process.env.ANDROID_KEY_ALIAS;
          j.signingKey.password = process.env.ANDROID_KEY_PASSWORD;

          // بعض الإصدارات تحتاج password في root signingKey
          // وبعضها قد يستفيد من keyStorePassword
          j.signingKey.keyStorePassword = process.env.ANDROID_KEYSTORE_PASSWORD;

          fs.writeFileSync(p, JSON.stringify(j, null, 2));
          console.log('Patched', p);
          NODE
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID](#)
