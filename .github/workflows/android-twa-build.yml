name: Android TWA Build

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Android version code (integer, e.g. 2)"
        required: false
        default: "1"
      version_name:
        description: "Android version name (e.g. 1.0.1)"
        required: false
        default: "1.0.0"
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present

  android-twa:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [web-build]
    defaults:
      run:
        shell: bash
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Verify environment
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          java -version 2>&1
          ls "$ANDROID_HOME/build-tools/"
          ls "$ANDROID_HOME/platforms/"
          ls "$ANDROID_HOME/platform-tools/" | head -5

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap (non-interactive)
        run: |
          mkdir -p "$HOME/.bubblewrap"
          echo '{"jdkPath":"'"$JAVA_HOME"'","androidSdkPath":"'"$ANDROID_HOME"'"}' > "$HOME/.bubblewrap/config.json"
          cat "$HOME/.bubblewrap/config.json"

      - name: Decode keystore
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "${{ github.workspace }}/android.keystore"
          chmod 600 "${{ github.workspace }}/android.keystore"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Patch TWA manifest
        run: |
          VERSION_CODE="${{ github.event.inputs.version_code || '1' }}"
          VERSION_NAME="${{ github.event.inputs.version_name || '1.0.0' }}"
          jq \
            --arg alias "$KEY_ALIAS" \
            --arg keyPath "${{ github.workspace }}/android.keystore" \
            --argjson vcode "$VERSION_CODE" \
            --arg vname "$VERSION_NAME" \
            '.signingKey.alias = $alias | .signingKey.path = $keyPath | .appVersionCode = $vcode | .appVersionName = $vname' \
            twa-manifest.json > twa-manifest.patched.json
          mv twa-manifest.patched.json twa-manifest.json

      - name: Build Android TWA (AAB + APK)
        run: |
          printf 'n\n' | bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: app-release-bundle/app-release.aab
          if-no-files-found: warn

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: app-release.apk
          if-no-files-found: warn
