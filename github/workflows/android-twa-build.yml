name: Build Android TWA (AAB + APK)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "main-work" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: "17"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=app/release.keystore
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Print signing SHA-256 fingerprint
        run: |
          keytool -list -v \
            -keystore android/app/release.keystore \
            -storepass "${{ secrets.ANDROID_STORE_PASSWORD }}" \
            -alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" | grep "SHA256:" || true

      - name: Build Release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release and upload binaries
        if: github.ref_name == 'main' || github.ref_name == 'main-work'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-build-${{ github.run_number }}
          name: Android Build ${{ github.run_number }}
          generate_release_notes: true
          files: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/debug/app-debug.apk
