    <!-- Splash overlay (outside #root so React doesn't displace it) -->
    <div id="splash-overlay" style="position:fixed;inset:0;z-index:9999;display:none;transition:opacity 0.4s ease;will-change:opacity;background:url('/splash-video-poster.jpg') center center / cover no-repeat #faf6f2;">
      <video id="splash-video" poster="/splash-video-poster.jpg" autoplay muted playsinline webkit-playsinline preload="auto"
        style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;pointer-events:none;opacity:1;"
      ></video>
      <style>
        #splash-video::-webkit-media-controls{display:none!important}
        #splash-video::-webkit-media-controls-enclosure{display:none!important}
        #splash-video::-webkit-media-controls-panel{display:none!important}
        #splash-video::-webkit-media-controls-start-playback-button{display:none!important}
        #splash-video::-webkit-media-controls-overlay-play-button{display:none!important}
        video::-webkit-media-controls-start-playback-button{display:none!important;-webkit-appearance:none}
      </style>
    </div>
    <script>
      (function(){
        var overlay=document.getElementById('splash-overlay');
        var vid=document.getElementById('splash-video');
        if(!overlay||!vid){return;}

        overlay.style.display='block';
        window.__htmlSplashVideoActive=true;
        window.__htmlSplashVideoEnded=false;

        var done=false;
        function endSplash(){
          if(done)return;
          done=true;
          window.__htmlSplashVideoActive=false;
          window.__htmlSplashVideoEnded=true;
          window.dispatchEvent(new CustomEvent('html-splash-ended'));
        }

        vid.addEventListener('canplay', function(){
          vid.style.opacity='1';
        }, {once:true});

        vid.addEventListener('playing', function(){
          vid.style.opacity='1';
        }, {once:true});

        vid.addEventListener('ended', endSplash, {once:true});
        vid.addEventListener('error', endSplash, {once:true});

        vid.src='/splash-video.mp4';
        var playPromise=vid.play();
        if(playPromise && playPromise.then){
          playPromise.catch(function(){
            endSplash();
          });
        }

        setTimeout(endSplash, 4000);
      })();
    </script>
